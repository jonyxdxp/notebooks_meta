# from https://github.com/facebookresearch/eb_jepa/blob/main/examples/ac_video_jepa/cfgs/planning_mppi.yaml






# Configuración JEPA Stage 2 (Predictor Training)
# Compatible con: código Transformer + VICReg/VC Loss

meta:
  seed: 2025
  device: auto          # auto, cuda, or cpu


data:
  dataset: moving_mnist
  batch_size: 64
  num_workers: 4
  max_seq_len: 16
  # AÑADIR ESTOS:
  eval_batch: 64        # Tamaño batch validación (o 128)
  num_target_spans: 4   # Para JEPAMaskCollator
  target_span_length: 8 # Para JEPAMaskCollator

model:
  vocab_size: 30522     # BERT vocab (igual que S1)
  hidden_size: 256      # igual que S1
  num_heads: 8          # igual que S1
  num_layers: 6         # igual que S1 — verificá con CFG de s1
  max_seq_len: 128      # igual que S1
  
  pred_hidden_size: 256
  pred_num_heads: 4
  pred_num_layers: 4
  dstc: 256             # debe coincidir con hidden_size del encoder
  

loss:
  # Variance-Covariance regularization (VICReg)
  std_coeff: 10.0       # Pérdida de desviación estándar
  cov_coeff: 100.0      # Pérdida de covarianza (off-diagonal)

optim:
  epochs: 50
  lr: 0.001
  weight_decay: 0.05    # AÑADIDO: regularización L2 (necesario para AdamW)

training:
  use_amp: true         # Mixed precision
  dtype: float16
  s1_ckpt: "/content/drive/MyDrive/metanet/v5/s1/checkpoints/epoch_best.pt"  # Ruta real
  ema_decay: 0.996      # AÑADIDO: Decay para Exponential Moving Average (0.9-0.999)

logging:
  log_wandb: true
  wandb_group: 
  log_every: 1          # Validar/loggear cada N épocas
  save_every: 10        # Guardar checkpoint cada N épocas
  tqdm_silent: false
  exp_dir: "/content/drive/MyDrive/metanet/v5/s2/checkpoints"  # AÑADIDO: Directorio para guardar checkpoints

# --- Parámetros para búsqueda de hiperparámetros (sweep) ---
sweep:
  param_grid:
    data.batch_size: [32, 64]
    optim.lr: [0.001, 0.0001, 0.0005]
    loss.std_coeff: [1, 10, 100, 200]
    loss.cov_coeff: [1, 10, 100, 200]
    meta.seed: [1, 1000, 10000]



